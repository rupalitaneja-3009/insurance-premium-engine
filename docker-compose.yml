services:
  postgres:
    image: postgres:15
    container_name: ipe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ipe_user
      POSTGRES_PASSWORD: ipe_pass123
      POSTGRES_DB: insurance_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ipe_redis
    restart: unless-stopped
    ports:
      - '6381:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
